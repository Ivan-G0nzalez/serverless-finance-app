name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Lambda layer
        run: |
          pip install -r layers/requirements.txt -t layers/python/ --quiet
          mkdir -p builds
          cd layers && zip -r ../builds/lambda_layer.zip python/ --quiet

      - name: Upload layer to S3 and commit hash
        env:
          BUCKET: app-finanzas-lambda-artifacts
        run: |
          aws s3 cp builds/lambda_layer.zip s3://$BUCKET/lambda_layer.zip
          openssl dgst -sha256 -binary builds/lambda_layer.zip | base64 > builds/lambda_layer.sha256
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add builds/lambda_layer.sha256
          git diff --staged --quiet || (git commit -m "build: update layer hash [skip ci]" && git push)

      - name: Trigger Terraform Cloud run
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
        run: |
          WORKSPACE_ID=$(curl -sf \
            --header "Authorization: Bearer $TF_API_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/ivan-gonzalez/workspaces/serverless-finance-app" \
            | jq -r '.data.id')

          curl -sf --request POST \
            --url "https://app.terraform.io/api/v2/runs" \
            --header "Authorization: Bearer $TF_API_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            --data "{
              \"data\": {
                \"attributes\": {
                  \"message\": \"Deploy from $(git rev-parse --short HEAD)\",
                  \"auto-apply\": true
                },
                \"relationships\": {
                  \"workspace\": {
                    \"data\": {
                      \"type\": \"workspaces\",
                      \"id\": \"$WORKSPACE_ID\"
                    }
                  }
                },
                \"type\": \"runs\"
              }
            }"
